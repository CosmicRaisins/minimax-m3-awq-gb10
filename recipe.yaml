# Recipe: MiniMax M3 AWQ INT4 production GB10 cluster path
# Verified on the four-node GB10 cluster (.126/.127/.128/.129).
# CUDA graphs remain disabled because this model corrupts output in the current
# image when graphs are enabled; EAGLE3 k=2 is the current best speculative path.

recipe_version: "1"
name: MiniMax-M3-AWQ-INT4-EAGLE3-k2-fp8kv-merged
description: MiniMax M3 AWQ INT4, TP=4 GB10 cluster, EAGLE3 k=2, 262k context, max_num_seqs=4

model: cyankiwi/MiniMax-M3-AWQ-INT4
container: vllm-node-tf5-minimax-m3-pr45744
cluster_only: true
solo_only: false

build_args:
  - --tf5

mods:
  - mods/fix-minimax-m3-tool-parser
  - mods/fix-minimax-m3-compressed-tensors
  - mods/fix-minimax-m3-reasoning-45718
  - mods/fix-nccl-2.30.4

defaults:
  port: 8200
  host: 0.0.0.0
  served_model_name: minimax-m3-awq
  tensor_parallel: 4
  gpu_memory_utilization: 0.90
  max_model_len: 262144
  max_num_batched_tokens: 8192
  max_num_seqs: 4
  draft_model: Inferact/MiniMax-M3-EAGLE3
  num_speculative_tokens: 2

env:
  HF_HUB_OFFLINE: "1"
  TRANSFORMERS_OFFLINE: "1"
  PYTORCH_CUDA_ALLOC_CONF: expandable_segments:False
  VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS: "0"
  NCCL_CUMEM_ENABLE: "0"
  NCCL_NVLS_ENABLE: "0"
  TORCH_CUDA_ARCH_LIST: 12.1a
  VLLM_MARLIN_USE_ATOMIC_ADD: "1"
  VLLM_EXECUTE_MODEL_TIMEOUT_SECONDS: "1800"
  VLLM_ALLOW_LONG_MAX_MODEL_LEN: "1"
  VLLM_SERVER_DEV_MODE: "1"
  VLLM_LOGGING_LEVEL: INFO

command: |
  vllm serve cyankiwi/MiniMax-M3-AWQ-INT4 \
      --served-model-name {served_model_name} \
      --trust-remote-code \
      --block-size 128 \
      --attention-backend TRITON_ATTN \
      --kv-cache-dtype fp8 \
      --language-model-only \
      --host {host} \
      --port {port} \
      -tp {tensor_parallel} \
      --distributed-executor-backend ray \
      --gpu-memory-utilization {gpu_memory_utilization} \
      --max-model-len {max_model_len} \
      --max-num-batched-tokens {max_num_batched_tokens} \
      --max-num-seqs {max_num_seqs} \
      --enable-prefix-caching \
      --enforce-eager \
      --reasoning-parser minimax_m3 \
      --enable-auto-tool-choice \
      --tool-call-parser minimax_m3 \
      --speculative-config '{{"method":"eagle3","model":"{draft_model}","num_speculative_tokens":{num_speculative_tokens},"attention_backend":"TRITON_ATTN"}}'
